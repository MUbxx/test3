<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CyberBuddy Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#071521;
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

/* header */

.header{
position:absolute;
top:20px;
left:20px;
font-size:22px;
font-weight:700;
}

.header span:first-child{
color:#00c7d9;
}

.header span:last-child{
color:white;
}

/* card */

.card{

width:92%;
max-width:420px;

background:#0e2234;

padding:35px;

border-radius:18px;

box-shadow:0 0 30px rgba(0,0,0,.4);

}

h1{
color:#00c7d9;
text-align:center;
}

.subtitle{
text-align:center;
font-size:14px;
color:#9ca3af;
margin-bottom:20px;
}

label{
font-size:12px;
color:#00c7d9;
}

input{

width:100%;
padding:12px;

margin:6px 0 12px;

border-radius:10px;

border:1px solid #1e3a4f;

background:#0c1a27;

color:white;

}

.login-btn{

width:100%;
padding:13px;

background:linear-gradient(90deg,#00c7d9,#1ba3d6);

border:none;

border-radius:10px;

font-weight:600;

cursor:pointer;

margin-top:10px;

}

.divider{

display:flex;

align-items:center;

margin:18px 0;

color:#6b7280;

font-size:13px;

}

.divider::before,
.divider::after{

content:"";

flex:1;

height:1px;

background:#1e3a4f;

}

.divider span{
margin:0 10px;
}

.google-btn{

width:100%;
padding:12px;

border-radius:10px;

border:1px solid #1e3a4f;

background:#0c1a27;

color:white;

cursor:pointer;

display:flex;

align-items:center;

justify-content:center;

gap:10px;

}

.register{
text-align:center;
margin-top:15px;
font-size:14px;
color:#9ca3af;
}

.register a{
color:#00c7d9;
text-decoration:none;
}

.forgot{
text-align:right;
font-size:12px;
color:#00c7d9;
cursor:pointer;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">

<span>Cyber</span><span>Buddy</span> Academy

</div>

<div class="card">

<h1>Welcome Back</h1>

<p class="subtitle">Sign in to your Cyber Buddy account</p>

<label>Email Address</label>
<input id="email" type="email" placeholder="you@email.com">

<label>Password</label>
<input id="password" type="password" placeholder="••••••••">

<div class="forgot" id="forgotBtn">
Forgot password?
</div>

<button class="login-btn" id="loginBtn">
Sign In
</button>

<div class="divider">
<span>OR</span>
</div>

<button class="google-btn" id="googleBtn">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">

Continue with Google

</button>

<div class="register">

No account?

<a href="register.html">Register free</a>

</div>

</div>

<!-- Firebase -->

<script type="module">

import { auth, db } from "./js/firebase.js";

import {
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

import {
doc,
getDoc,
setDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

async function ensureUser(user){

const ref=doc(db,"users",user.uid);

const snap=await getDoc(ref);

if(!snap.exists()){

await setDoc(ref,{
name:user.displayName || "Student",
email:user.email,
role:"user",
createdAt:serverTimestamp()
});

}

}

document.getElementById("loginBtn").onclick=async()=>{

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

try{

const res=await signInWithEmailAndPassword(auth,email,password);

await ensureUser(res.user);

window.location="dashboard.html";

}catch(e){

alert(e.message);

}

};

document.getElementById("googleBtn").onclick=async()=>{

try{

const provider=new GoogleAuthProvider();

const result=await signInWithPopup(auth,provider);

await ensureUser(result.user);

window.location="dashboard.html";

}catch(e){

alert("Google login failed");

}

};

document.getElementById("forgotBtn").onclick=async()=>{

const email=document.getElementById("email").value;

if(!email){
alert("Enter email first");
return;
}

try{

await sendPasswordResetEmail(auth,email);

alert("Password reset email sent");

}catch(e){

alert(e.message);

}

};

</script>

</body>
</html>
