<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CyberBuddy Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#071521;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

}

/* header */

.header{

position:absolute;
top:20px;
left:20px;
font-size:22px;
font-weight:700;

}

.header span:first-child{

color:#00c7d9;

}

.header span:last-child{

color:white;

}

/* container */

.container{

width:95%;
max-width:420px;

background:#0e2234;

border-radius:18px;

padding:35px;

box-shadow:0 0 25px rgba(0,0,0,.4);

}

/* title */

.title{

text-align:center;

margin-bottom:20px;

}

.title h1{

color:#00c7d9;

margin-bottom:5px;

}

.title p{

color:#9ca3af;

font-size:14px;

}

/* label */

label{

display:block;

margin-top:15px;

font-size:12px;

letter-spacing:1px;

color:#00c7d9;

}

/* input */

input{

width:100%;

padding:12px;

margin-top:6px;

border-radius:10px;

border:1px solid #1e3a4f;

background:#0c1a27;

color:white;

font-size:14px;

}

input::placeholder{

color:#6b7280;

}

/* forgot */

.forgot{

text-align:right;

margin-top:5px;

font-size:12px;

color:#00c7d9;

cursor:pointer;

}

/* button */

.login-btn{

margin-top:20px;

width:100%;

padding:13px;

border:none;

border-radius:10px;

background:linear-gradient(90deg,#00c7d9,#1ba3d6);

font-size:16px;

font-weight:600;

cursor:pointer;

}

/* divider */

.divider{

display:flex;

align-items:center;

margin:18px 0;

color:#6b7280;

font-size:13px;

}

.divider::before,
.divider::after{

content:"";

flex:1;

height:1px;

background:#1e3a4f;

}

.divider span{

margin:0 10px;

}

/* google */

.google-btn{

width:100%;

padding:12px;

border-radius:10px;

border:1px solid #1e3a4f;

background:#0c1a27;

color:white;

font-size:15px;

cursor:pointer;

display:flex;

align-items:center;

justify-content:center;

gap:10px;

}

/* register */

.register{

margin-top:15px;

text-align:center;

font-size:14px;

color:#9ca3af;

}

.register a{

color:#00c7d9;

font-weight:600;

text-decoration:none;

}

</style>
</head>

<body>

<div class="header">

<span>Cyber</span><span>Buddy</span> Academy

</div>

<div class="container">

<div class="title">

<h1>Welcome Back</h1>

<p>Sign in to your Cyber Buddy account</p>

</div>

<label>Email Address</label>

<input type="email" placeholder="you@email.com">

<label>Password</label>

<input type="password" placeholder="••••••••">

<div class="forgot">

Forgot password?

</div>

<button class="login-btn">

Sign In

</button>

<div class="divider">

<span>OR</span>

</div>

<button class="google-btn">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">

Continue with Google

</button>

<div class="register">

No account?

<a href="register.html">

Register free

</a>

</div>

</div>

</body>
</html>
