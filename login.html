<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Cyber Buddy Academy</title>
<link rel="icon" href="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/main/mylogo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
<style>:root{--c:#06b6d4;--c2:#0ea5e9;--bg:#0b1220;--bg2:#0d1829;--bg3:#111f33;--bdr:rgba(6,182,212,.12);--tx:#e6f6f8;--dim:#64748b}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}.top-nav{position:relative;z-index:10;height:54px;background:rgba(11,18,32,.95);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 24px;backdrop-filter:blur(12px)}.nav-logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:.95rem;color:var(--c)}.nav-logo img{width:28px;height:28px;border-radius:7px}.page{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:28px 16px}.glass-card{background:rgba(13,24,41,.88);border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(16px);border-radius:14px;padding:28px}.inp{width:100%;padding:10px 13px;background:rgba(255,255,255,.05);border:1.5px solid rgba(6,182,212,.18);border-radius:9px;color:var(--tx);font-family:'Poppins',sans-serif;font-size:.86rem;outline:none;transition:border-color .22s,box-shadow .22s}.inp:focus{border-color:var(--c);box-shadow:0 0 0 3px rgba(6,182,212,.09)}.inp::placeholder{color:rgba(230,246,248,.28)}.inp.err-field{border-color:#f43f5e!important;box-shadow:0 0 0 3px rgba(244,63,94,.07)!important}.lbl{display:block;font-size:.67rem;font-weight:700;color:var(--c);text-transform:uppercase;letter-spacing:1.3px;margin-bottom:5px}.field-err{font-size:.7rem;color:#f87171;margin-top:4px;display:none}.field-err.show{display:block}.btn-primary{width:100%;padding:11px;background:linear-gradient(135deg,#06b6d4,#0ea5e9);color:#042028;font-weight:700;font-size:.88rem;border:none;border-radius:9px;cursor:pointer;transition:transform .18s,box-shadow .18s;font-family:'Poppins',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px}.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 7px 20px rgba(6,182,212,.32)}.btn-primary:disabled{opacity:.6;cursor:not-allowed}.btn-google{width:100%;padding:10px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;color:var(--tx);font-weight:600;font-size:.86rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;font-family:'Poppins',sans-serif}.btn-google:hover:not(:disabled){background:rgba(255,255,255,.09);border-color:rgba(6,182,212,.3)}.btn-google:disabled{opacity:.6;cursor:not-allowed}.divider{display:flex;align-items:center;gap:10px;color:rgba(230,246,248,.22);font-size:.75rem}.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}.alert-box{padding:10px 13px;border-radius:8px;font-size:.8rem;font-weight:600;display:none;align-items:center;gap:8px;line-height:1.4}.alert-box.show{display:flex}.alert-box.error{background:rgba(76,5,25,.75);border:1px solid rgba(244,63,94,.3);color:#fda4af}.alert-box.success{background:rgba(6,78,59,.75);border:1px solid rgba(16,185,129,.28);color:#6ee7b7}.alert-box.info{background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.22);color:var(--c)}.verify-notice{background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.2);border-radius:8px;padding:10px 13px;font-size:.78rem;color:#fde68a;display:none}.verify-notice.show{display:block}.pw-wrap{position:relative}.pw-wrap .inp{padding-right:42px}.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:.86rem;padding:3px}</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="top-nav"> <div class="nav-logo"> <img src="https://raw.githubusercontent.com/Mubyyy404/Cyber-Buddy/refs/heads/main/mylogo.png" alt=""> <span>Cyber<span style="color:#fff;">Buddy</span> <span style="font-size:.65rem;font-weight:500;color:var(--dim);">Academy</span></span> </div>
</div>
<div class="page"> <div style="width:100%;max-width:420px;"> <div style="text-align:center;margin-bottom:22px;"> <div style="width:54px;height:54px;border-radius:13px;background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.22);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;"> <i class="fas fa-shield-alt" style="color:var(--c);font-size:1.2rem;"></i> </div> <h1 style="font-size:1.3rem;font-weight:800;color:var(--c);">Welcome Back</h1> <p style="font-size:.78rem;color:var(--dim);margin-top:4px;">Sign in to your Cyber Buddy account</p> </div> <div class="glass-card"> <div id="alertBox" class="alert-box" style="margin-bottom:14px;"><i id="alertIco" class="fas fa-exclamation-circle" style="flex-shrink:0;"></i><span id="alertTxt"></span></div> <div id="verifyNotice" class="verify-notice" style="margin-bottom:14px;"> <i class="fas fa-envelope" style="margin-right:5px;"></i>Email not verified.
 <button id="resendBtn" style="background:none;border:none;color:var(--c);font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;font-size:.78rem;text-decoration:underline;">Resend link</button> </div> <div style="margin-bottom:14px;"> <label class="lbl">Email Address</label> <input id="emailInp" type="email" class="inp" placeholder="you@email.com" autocomplete="email"> <p class="field-err" id="emailErr"></p> </div> <div style="margin-bottom:18px;"> <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;"> <label class="lbl" style="margin-bottom:0;">Password</label> <button id="forgotBtn" style="background:none;border:none;font-size:.7rem;color:var(--c);cursor:pointer;font-family:'Poppins',sans-serif;font-weight:600;">Forgot password?</button> </div> <div class="pw-wrap"> <input id="passInp" type="password" class="inp" placeholder="••••••••" autocomplete="current-password"> <button class="pw-toggle" id="togglePw" type="button"><i class="fas fa-eye" id="pwIco"></i></button> </div> <p class="field-err" id="passErr"></p> </div> <button id="loginBtn" class="btn-primary" style="margin-bottom:14px;"><i class="fas fa-sign-in-alt"></i> Sign In</button> <div class="divider" style="margin-bottom:14px;">OR</div> <button id="googleBtn" class="btn-google" style="margin-bottom:18px;"> <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt=""> Continue with Google
 </button> <p style="text-align:center;font-size:.8rem;color:var(--dim);">No account? <a href="register.html" style="color:var(--c);font-weight:700;text-decoration:none;margin-left:3px;">Register free</a></p> </div> </div>
</div> <script>const cv=document.getElementById('bgCanvas'),cx=cv.getContext('2d');let dp=[];
function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;dp=Array.from({length:Math.floor(cv.width/16)},()=>Math.random()*40);}
rsz();window.addEventListener('resize',rsz);
setInterval(()=>{cx.fillStyle='rgba(11,18,32,.1)';cx.fillRect(0,0,cv.width,cv.height);cx.fillStyle='rgba(6,182,212,.5)';cx.font='12px monospace';dp.forEach((y,i)=>{cx.fillText(Math.random()>.5?'1':'0',i*16,y*16);if(y*16>cv.height&&Math.random()>.975)dp[i]=0;dp[i]+=.8;});},55);
const pi=document.getElementById('passInp'),pico=document.getElementById('pwIco');
document.getElementById('togglePw').onclick=()=>{const v=pi.type==='password';pi.type=v?'text':'password';pico.className=v?'fas fa-eye-slash':'fas fa-eye';};
document.getElementById('passInp').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginBtn').click();});
document.getElementById('emailInp').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('passInp').focus();});</script> <script type="module">import { auth, db } from "./js/firebase.js";
import { signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, sendEmailVerification, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
function showAlert(msg,type='error'){
const b=document.getElementById('alertBox'),t=document.getElementById('alertTxt'),ic=document.getElementById('alertIco');
t.textContent=msg; b.className=`alert-box show ${type}`;
ic.className=type==='success'?'fas fa-check-circle':(type==='info'?'fas fa-info-circle':'fas fa-exclamation-circle');
ic.style.flexShrink='0';
}
function clearUI(){
document.getElementById('alertBox').classList.remove('show');
document.getElementById('verifyNotice').classList.remove('show');
['emailInp','passInp'].forEach(id=>document.getElementById(id).classList.remove('err-field'));
['emailErr','passErr'].forEach(id=>{const e=document.getElementById(id);e.textContent='';e.classList.remove('show');});
}
function fldErr(fid,eid,msg){
document.getElementById(fid).classList.add('err-field');
const e=document.getElementById(eid);e.textContent=msg;e.classList.add('show');
}
function errMap(code){
const m={'auth/user-not-found':'No account found with this email.','auth/wrong-password':'Incorrect password. Please try again.','auth/invalid-credential':'Incorrect email or password.','auth/invalid-email':'Please enter a valid email address.','auth/user-disabled':'Account disabled. Contact support.','auth/too-many-requests':'Too many attempts. Wait a few minutes.','auth/network-request-failed':'Network error. Check your connection.','auth/popup-closed-by-user':null,'auth/cancelled-popup-request':null,'auth/popup-blocked':'Popup blocked — allow popups for this site.','auth/account-exists-with-different-credential':'This email is linked to a different sign-in method.'};
return m[code]!==undefined?m[code]:null;
}
async function redirectByRole(user){
try{const snap=await getDoc(doc(db,'users',user.uid));if(snap.exists()&&snap.data().role==='admin'){window.location='admin.html';return;}}catch(_){}
window.location='dashboard.html';
}
onAuthStateChanged(auth,async user=>{if(user&&user.emailVerified)await redirectByRole(user);});
let pendingUser=null;
document.getElementById('loginBtn').onclick=async()=>{
clearUI();
const email=document.getElementById('emailInp').value.trim();
const pass=document.getElementById('passInp').value;
if(!email){fldErr('emailInp','emailErr','Email address is required.');return;}
if(!pass){fldErr('passInp','passErr','Password is required.');return;}
const btn=document.getElementById('loginBtn');
btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Signing in...';
try{
const res=await signInWithEmailAndPassword(auth,email,pass);
if(!res.user.emailVerified){
pendingUser=res.user;
document.getElementById('verifyNotice').classList.add('show');
showAlert('Please verify your email before signing in.','info');
btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Sign In';return;
}
await redirectByRole(res.user);
}catch(err){
const msg=errMap(err.code);
const fallback=err.message.replace('Firebase: ','').replace(/\(auth.*\)/,'');
if(err.code==='auth/user-not-found'||err.code==='auth/invalid-email') fldErr('emailInp','emailErr',msg||fallback);
else if(err.code==='auth/wrong-password'||err.code==='auth/invalid-credential') fldErr('passInp','passErr',msg||fallback);
else if(msg) showAlert(msg,'error');
else showAlert(fallback||'Sign-in failed. Please try again.','error');
btn.disabled=false;btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Sign In';
}
};
document.getElementById('resendBtn').onclick=async()=>{
if(!pendingUser)return;
try{await sendEmailVerification(pendingUser);showAlert('Verification email resent! Check your inbox.','success');}
catch(e){showAlert('Could not resend. Try again shortly.','error');}
};
document.getElementById('googleBtn').onclick=async()=>{
clearUI();
const btn=document.getElementById('googleBtn');
btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Connecting...';
try{
const provider=new GoogleAuthProvider();
provider.addScope('profile');provider.addScope('email');
const result=await signInWithPopup(auth,provider);
const user=result.user;
const ref=doc(db,'users',user.uid);
const snap=await getDoc(ref);
if(!snap.exists()){
await setDoc(ref,{
name:user.displayName||'Student',
email:user.email,
phone:'',
role:'user',
purchasedCourses:[],
createdAt:serverTimestamp(),
authProvider:'google'
});
} else {
if(!snap.data().authProvider){
await setDoc(ref,{authProvider:'google'},{ merge:true });
}
}
await redirectByRole(user);
}catch(err){
const msg=errMap(err.code);
if(err.code!=='auth/popup-closed-by-user'&&err.code!=='auth/cancelled-popup-request'){
showAlert(msg||'Google sign-in failed. Please try again.','error');
}
btn.disabled=false;
btn.innerHTML='<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt=""> Continue with Google';
}
};
document.getElementById('forgotBtn').onclick=async()=>{
clearUI();
const email=document.getElementById('emailInp').value.trim();
if(!email){fldErr('emailInp','emailErr','Enter your email address first.');return;}
try{
await sendPasswordResetEmail(auth,email);
showAlert('Password reset email sent to '+email,'success');
}catch(err){
if(err.code==='auth/user-not-found') fldErr('emailInp','emailErr','No account found with this email.');
else if(err.code==='auth/invalid-email') fldErr('emailInp','emailErr','Please enter a valid email address.');
else showAlert(err.message,'error');
}
};</script>
</body>
</html>
